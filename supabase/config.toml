# Supabase local development configuration
# © 2026 Paradox FZCO — Developed by SaaSolutions SL

[api]
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
port = 54323
enabled = true

[inbucket]
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
file_size_limit = "50MiB"

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = [
  "https://delicious-fitness-web.vercel.app",
  "https://delicious-fitness-web.vercel.app/auth/callback"
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = true

[auth.sms]
enable_signup = false

[auth.external.google]
enabled = true
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_CLIENT_SECRET)"
redirect_uri = ""

[functions]
verify_jwt = false  # Set per-function below

[functions.create-checkout-session]
verify_jwt = true

[functions.create-portal-session]
verify_jwt = true

[functions.generate-meal-plan]
verify_jwt = true

[functions.translate-recipe]
verify_jwt = false  # Called by server-side triggers (service role)

[functions.stripe-webhook]
verify_jwt = false  # Stripe calls this directly, verified by signature

[functions.track-affiliate-click]
verify_jwt = false  # Public redirect endpoint

[analytics]
enabled = false
